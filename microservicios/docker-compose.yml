services:

  # ═══════════════════════════════════════════
  # BASES DE DATOS
  # ═══════════════════════════════════════════
  postgres-auth:
    image: postgres:15
    container_name: red-hospital-pg-auth
    environment:
      POSTGRES_DB: db_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_auth_data:/var/lib/postgresql/data
    networks:
      - red-hospital

  mysql-pacientes:
    image: mysql:8
    container_name: red-hospital-mysql-pacientes
    environment:
      MYSQL_DATABASE: db_pacientes
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_pacientes_data:/var/lib/mysql
    networks:
      - red-hospital

  mssql-citas:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: red-hospital-mssql-citas
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourPassword123!"
      MSSQL_PID: Developer
    ports:
      - "14333:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourPassword123!" -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mssql_citas_data:/var/opt/mssql
    networks:
      - red-hospital

  mysql-medicamentos:
    image: mysql:8
    container_name: red-hospital-mysql-medicamentos
    environment:
      MYSQL_DATABASE: db_medicamentos
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_medicamentos_data:/var/lib/mysql
    networks:
      - red-hospital

  # ═══════════════════════════════════════════
  # INFRAESTRUCTURA
  # ═══════════════════════════════════════════
  consul:
    image: hashicorp/consul:1.15
    container_name: red-hospital-consul
    command: ["agent", "-dev", "-ui", "-bind=0.0.0.0", "-client=0.0.0.0"]
    ports:
      - "8500:8500"
    networks:
      - red-hospital

  config-server:
    build: ./infraestructura/config-server
    container_name: red-hospital-config-server
    ports:
      - "8888:8888"
    environment:
      CONSUL_HOST: consul
    volumes:
      - ./infraestructura/config-server/configs/gateway-docker.yml:/app/configs/gateway.yml
    depends_on:
      consul:
        condition: service_started
    networks:
      - red-hospital

  # ═══════════════════════════════════════════
  # API GATEWAY
  # ═══════════════════════════════════════════
  gateway:
    build: ./infraestructura/gateway
    container_name: red-hospital-gateway
    ports:
      - "8000:8000"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      CONSUL_HOST: consul
      CONSUL_ADDRESS: gateway
      PORT: 8000
    depends_on:
      config-server:
        condition: service_started
      consul:
        condition: service_started
    networks:
      - red-hospital

  # ═══════════════════════════════════════════
  # MICROSERVICIOS (3 de negocio + auth)
  # ═══════════════════════════════════════════
  auth-service:
    build: ./auth-service
    container_name: red-hospital-auth
    ports:
      - "8001:8001"
    environment:
      USE_SQLITE: "False"
      CONFIG_SERVER: http://config-server:8888
      CONSUL_HOST: consul
      CONSUL_ADDRESS: auth-service
      PORT: 8001
      CITAS_SERVICE_URL: http://citas-service:8003
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8001"
    depends_on:
      postgres-auth:
        condition: service_healthy
      config-server:
        condition: service_started
      consul:
        condition: service_started
    networks:
      - red-hospital

  pacientes-service:
    build: ./pacientes-service
    container_name: red-hospital-pacientes
    ports:
      - "8002:8002"
    environment:
      USE_SQLITE: "False"
      CONFIG_SERVER: http://config-server:8888
      CONSUL_HOST: consul
      CONSUL_ADDRESS: pacientes-service
      PORT: 8002
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8002"
    depends_on:
      mysql-pacientes:
        condition: service_healthy
      config-server:
        condition: service_started
      consul:
        condition: service_started
    networks:
      - red-hospital

  citas-service:
    build: ./citas-service
    container_name: red-hospital-citas
    ports:
      - "8003:8003"
    environment:
      USE_SQLITE: "False"
      CONFIG_SERVER: http://config-server:8888
      CONSUL_HOST: consul
      CONSUL_ADDRESS: citas-service
      PORT: 8003
      SERVICE_PACIENTES: http://pacientes-service:8002
      SERVICE_MEDICAMENTOS: http://medicamentos-service:8005
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8003"
    depends_on:
      mssql-citas:
        condition: service_healthy
      config-server:
        condition: service_started
      consul:
        condition: service_started
    networks:
      - red-hospital

  medicamentos-service:
    build: ./medicamentos-service
    container_name: red-hospital-medicamentos
    ports:
      - "8005:8005"
    environment:
      USE_SQLITE: "False"
      CONFIG_SERVER: http://config-server:8888
      CONSUL_HOST: consul
      CONSUL_ADDRESS: medicamentos-service
      PORT: 8005
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8005"
    depends_on:
      mysql-medicamentos:
        condition: service_healthy
      config-server:
        condition: service_started
      consul:
        condition: service_started
    networks:
      - red-hospital


volumes:
  pg_auth_data:
  mysql_pacientes_data:
  mssql_citas_data:
  mysql_medicamentos_data:

networks:
  red-hospital:
    name: red-hospital
    driver: bridge
