apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: red-hospital
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
      - name: wait-postgres
        image: busybox:1.36
        command: ["sh", "-c", "until nc -z postgres-auth 5432; do sleep 2; done"]
      containers:
      - name: auth
        image: auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
        env:
        - name: USE_SQLITE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: USE_SQLITE
        - name: CONFIG_SERVER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONFIG_SERVER
        - name: CONSUL_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONSUL_HOST
        - name: PORT
          value: "8001"
        - name: CITAS_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CITAS_SERVICE_URL
        command: ["sh", "-c", "python manage.py migrate && python manage.py runserver 0.0.0.0:8001"]
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: red-hospital
spec:
  selector:
    app: auth-service
  ports:
  - port: 8001
    targetPort: 8001
