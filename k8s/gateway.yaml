apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: red-hospital
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      initContainers:
      - name: wait-config-server
        image: busybox:1.36
        command: ["sh", "-c", "until nc -z config-server 8888; do sleep 2; done"]
      - name: wait-consul
        image: busybox:1.36
        command: ["sh", "-c", "until nc -z consul 8500; do sleep 2; done"]
      containers:
      - name: gateway
        image: gateway:latest

        ports:
        - containerPort: 8000
        env:
        - name: CONFIG_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONFIG_SERVER_URL
        - name: CONSUL_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONSUL_HOST
        - name: CONSUL_ADDRESS
          value: gateway
        - name: PORT
          value: "8000"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: red-hospital
spec:
  selector:
    app: gateway
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer
