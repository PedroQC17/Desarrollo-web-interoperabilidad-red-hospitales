apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: red-hospital
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: CONFIG_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONFIG_SERVER_URL
        - name: CONSUL_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONSUL_HOST
        - name: CONSUL_ADDRESS
          value: gateway
        - name: PORT
          value: "8000"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: red-hospital
spec:
  selector:
    app: gateway
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer
