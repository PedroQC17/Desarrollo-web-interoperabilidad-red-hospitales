apiVersion: apps/v1
kind: Deployment
metadata:
  name: pacientes-service
  namespace: red-hospital
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pacientes-service
  template:
    metadata:
      labels:
        app: pacientes-service
    spec:
      initContainers:
      - name: wait-mysql
        image: busybox:1.36
        command: ["sh", "-c", "until nc -z mysql-pacientes 3306; do sleep 2; done"]
      containers:
      - name: pacientes
        image: pacientes-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8002
        env:
        - name: USE_SQLITE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: USE_SQLITE
        - name: CONFIG_SERVER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONFIG_SERVER
        - name: CONSUL_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONSUL_HOST
        - name: PORT
          value: "8002"
        command: ["sh", "-c", "python manage.py migrate && python manage.py runserver 0.0.0.0:8002"]
---
apiVersion: v1
kind: Service
metadata:
  name: pacientes-service
  namespace: red-hospital
spec:
  selector:
    app: pacientes-service
  ports:
  - port: 8002
    targetPort: 8002
